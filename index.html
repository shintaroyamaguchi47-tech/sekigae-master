<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席替えマスター</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪑</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>*{font-family:'Noto Sans JP',sans-serif;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect,useMemo,useRef}=React;
const SK="sekigae_v5";
const ld=()=>{try{return JSON.parse(localStorage.getItem(SK))}catch{return null}};
const svLS=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
const clr=()=>{try{localStorage.removeItem(SK)}catch{}};
const ZF=[0,1],ZB=[4,5,6,7];
const shuf=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const gN=(si,cols)=>{const r=Math.floor(si/cols),c=si%cols,n=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nc>=0&&nc<cols)n.push(nr*cols+nc);}return n;};
const gLR=(si,cols)=>{const c=si%cols,n=[];if(c>0)n.push(si-1);if(c<cols-1)n.push(si+1);return n;};
const parseCSV=text=>{const lines=text.split(/\r?\n/).filter(l=>l.trim());if(!lines.length)return[];const sep=lines[0].includes("\t")?"\t":",";const hdrs=lines[0].split(sep).map(h=>h.replace(/^"|"$/g,"").trim());return lines.slice(1).map(line=>{const vals=line.split(sep).map(v=>v.replace(/^"|"$/g,"").trim());const obj={};hdrs.forEach((h,i)=>{obj[h]=vals[i]||"";});return obj;});};

// Group colors
const GC=[
  {bg:"bg-sky-100",border:"border-sky-300",label:"bg-sky-200 text-sky-800"},
  {bg:"bg-amber-100",border:"border-amber-300",label:"bg-amber-200 text-amber-800"},
  {bg:"bg-emerald-100",border:"border-emerald-300",label:"bg-emerald-200 text-emerald-800"},
  {bg:"bg-rose-100",border:"border-rose-300",label:"bg-rose-200 text-rose-800"},
  {bg:"bg-violet-100",border:"border-violet-300",label:"bg-violet-200 text-violet-800"},
  {bg:"bg-orange-100",border:"border-orange-300",label:"bg-orange-200 text-orange-800"},
  {bg:"bg-teal-100",border:"border-teal-300",label:"bg-teal-200 text-teal-800"},
  {bg:"bg-pink-100",border:"border-pink-300",label:"bg-pink-200 text-pink-800"},
];

// Check if two adjacent seats are in different groups → draw thick border
function getBorders(idx, cols, groupMap) {
  const g = groupMap[idx];
  if (g === 0 || g === undefined) return {};
  const row = Math.floor(idx / cols), col = idx % cols;
  const borders = {};
  // right
  if (col < cols - 1) { const rg = groupMap[idx + 1]; if (rg !== g && rg > 0) borders.right = true; }
  // bottom
  const bIdx = idx + cols;
  if (bIdx < Object.keys(groupMap).length || groupMap[bIdx] !== undefined) { const bg2 = groupMap[bIdx]; if (bg2 !== undefined && bg2 !== g && bg2 > 0) borders.bottom = true; }
  // left
  if (col > 0) { const lg = groupMap[idx - 1]; if (lg !== g && lg > 0) borders.left = true; }
  // top
  if (row > 0) { const tg = groupMap[idx - cols]; if (tg !== g && tg > 0) borders.top = true; }
  return borders;
}

function genSeat(students,rows,cols,constraints,history,pinned,genderMix){
  const ts=rows*cols,fr=ZF.filter(r=>r<rows),br=ZB.filter(r=>r<rows);
  const ps=new Map(),pst=new Set();
  Object.entries(pinned).forEach(([sid,seat])=>{if(seat!=null&&seat<ts){ps.set(seat,sid);pst.add(sid);}});
  const sm={};students.forEach(s=>(sm[s.id]=s));
  const up=students.filter(s=>!pst.has(s.id)),nf=up.filter(s=>s.needsFront),pb=up.filter(s=>s.tall&&!s.needsFront),ot=up.filter(s=>!s.needsFront&&!s.tall);
  const sp=constraints.filter(c=>c.type==="separate"),pp=constraints.filter(c=>c.type==="pair");
  let best=null,bs=-Infinity;
  for(let att=0;att<600;att++){
    const a=new Array(ts).fill(null);const pl=new Set();let ok=true;
    ps.forEach((sid,seat)=>{a[seat]=sid;pl.add(sid);});
    const av=idxs=>idxs.filter(i=>a[i]===null);
    const fs=shuf(av(fr.flatMap(r=>Array.from({length:cols},(_,c)=>r*cols+c))));
    for(const s of shuf(nf)){const seat=fs.shift();if(seat!==undefined){a[seat]=s.id;pl.add(s.id);}else{ok=false;break;}}
    if(!ok)continue;
    const bp=shuf(av(br.flatMap(r=>Array.from({length:cols},(_,c)=>r*cols+c))));
    const mp=shuf(av(Array.from({length:ts},(_,i)=>i).filter(i=>Math.floor(i/cols)>=2)));
    for(const s of shuf(pb)){const seat=[...bp,...mp].find(i=>a[i]===null);if(seat!==undefined){a[seat]=s.id;pl.add(s.id);}}
    const rem=shuf(av(Array.from({length:ts},(_,i)=>i)));
    const left=shuf([...ot,...pb.filter(s=>!pl.has(s.id))]);
    for(let i=0;i<left.length&&i<rem.length;i++){a[rem[i]]=left[i].id;pl.add(left[i].id);}
    let sc=0;
    for(const{studentA:sA,studentB:sB}of sp){const pA=a.indexOf(sA),pB=a.indexOf(sB);if(pA===-1||pB===-1)continue;sc+=gN(pA,cols).includes(pB)?-100:20;}
    for(const{studentA:sA,studentB:sB}of pp){const pA=a.indexOf(sA),pB=a.indexOf(sB);if(pA===-1||pB===-1)continue;sc+=gN(pA,cols).includes(pB)?30:-50;}
    if(genderMix){for(let seat=0;seat<ts;seat++){if(!a[seat])continue;const st=sm[a[seat]];if(!st||!st.gender)continue;for(const nb of gLR(seat,cols)){if(!a[nb])continue;const ns=sm[a[nb]];if(!ns||!ns.gender)continue;sc+=st.gender!==ns.gender?8:-5;}}}
    if(history.length>0){const last=history[history.length-1];for(let seat=0;seat<ts;seat++){if(!a[seat])continue;const cn=gN(seat,cols).map(n=>a[n]).filter(Boolean);for(const prev of last){if(prev.studentId===a[seat]){for(const c of cn){if((prev.neighbors||[]).includes(c))sc-=15;}}}}}
    if(sc>bs){bs=sc;best=[...a];}if(bs>=0&&att>80)break;
  }
  return best;
}

function Badge({children,color="blue",onRemove}){
  const c={blue:"bg-sky-100 text-sky-700 border-sky-200",amber:"bg-amber-100 text-amber-700 border-amber-200",rose:"bg-rose-100 text-rose-700 border-rose-200",emerald:"bg-emerald-100 text-emerald-700 border-emerald-200",pin:"bg-indigo-100 text-indigo-700 border-indigo-200"};
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border ${c[color]||c.blue}`}>{children}{onRemove&&<button onClick={onRemove} className="hover:opacity-70 ml-0.5">×</button>}</span>;
}

function ExcelImport({onImport,existingNames}){
  const fr=useRef(null);const[preview,setPreview]=useState(null);const[headers,setHeaders]=useState([]);
  const[mapping,setMapping]=useState({name:"",needsFront:"",tall:"",gender:""});const[rawData,setRawData]=useState([]);
  const[error,setError]=useState("");const[loading,setLoading]=useState(false);
  const autoMap=hdrs=>({name:hdrs.find(h=>/名前|氏名|name|生徒/i.test(h))||hdrs[0],needsFront:hdrs.find(h=>/視力|前方|front|めがね|配慮/i.test(h))||"",tall:hdrs.find(h=>/身長|高|tall/i.test(h))||"",gender:hdrs.find(h=>/性別|gender|sex|男女/i.test(h))||""});
  const proc=json=>{if(!json.length){setError("データなし");return;}const h=Object.keys(json[0]);setHeaders(h);setRawData(json);setMapping(autoMap(h));setPreview(json.slice(0,5));};
  const handleFile=async e=>{const file=e.target.files?.[0];if(!file)return;setError("");setLoading(true);try{if(/\.(csv|tsv|txt)$/i.test(file.name))proc(parseCSV(await file.text()));else{const buf=await file.arrayBuffer();const wb=XLSX.read(new Uint8Array(buf),{type:"array"});proc(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""}));}}catch(err){setError("失敗:"+err.message);}finally{setLoading(false);}};
  const doImport=()=>{if(!mapping.name){setError("名前列を選択");return;}const isTr=v=>{if(typeof v==="boolean")return v;if(typeof v==="number")return v>0;if(typeof v==="string")return/^(○|◯|〇|true|yes|1|はい|あり)/i.test(v.trim());return false;};const pG=v=>{const s=String(v||"").trim();if(/^(男|male|m|M|1)$/.test(s))return"M";if(/^(女|female|f|F|2)$/.test(s))return"F";return"";};const ns=[];let sk=0;for(const row of rawData){const name=String(row[mapping.name]||"").trim();if(!name)continue;if(existingNames.includes(name)){sk++;continue;}ns.push({id:`s_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,name,needsFront:mapping.needsFront?isTr(row[mapping.needsFront]):false,tall:mapping.tall?isTr(row[mapping.tall]):false,gender:mapping.gender?pG(row[mapping.gender]):""});}onImport(ns,sk);setPreview(null);setRawData([]);setHeaders([]);if(fr.current)fr.current.value="";};
  return <div className="space-y-4">
    <div><label className="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">ファイル選択</label><input ref={fr} type="file" accept=".xlsx,.xls,.csv,.tsv,.txt" onChange={handleFile} className="block w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-sky-50 file:text-sky-600 hover:file:bg-sky-100 cursor-pointer"/><p className="mt-2 text-xs text-slate-400">「名前」「性別」「視力」「身長」を自動認識</p></div>
    {loading&&<p className="text-sm text-sky-500 flex items-center gap-2"><span className="w-4 h-4 border-2 border-sky-300 border-t-sky-600 rounded-full animate-spin"/>読込中</p>}
    {error&&<p className="text-sm text-rose-500 bg-rose-50 rounded-lg px-3 py-2">{error}</p>}
    {preview&&<div className="space-y-4">
      <div className="bg-slate-50 rounded-xl p-4 border border-slate-100"><p className="text-xs font-bold text-slate-600 mb-3">列の対応付け</p><div className="grid grid-cols-2 sm:grid-cols-4 gap-3">{[{k:"name",l:"名前*"},{k:"gender",l:"性別"},{k:"needsFront",l:"前方優先"},{k:"tall",l:"高身長"}].map(({k,l})=><div key={k}><label className="block text-xs text-slate-500 mb-1">{l}</label><select value={mapping[k]} onChange={e=>setMapping(m=>({...m,[k]:e.target.value}))} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">{k==="name"?<option value="">選択</option>:<option value="">なし</option>}{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></div>)}</div></div>
      <div className="overflow-x-auto rounded-xl border border-slate-200"><table className="w-full text-xs"><thead><tr className="bg-slate-50">{headers.map(h=><th key={h} className="px-3 py-2 text-left font-semibold whitespace-nowrap text-slate-500">{h}</th>)}</tr></thead><tbody>{preview.map((row,i)=><tr key={i} className="border-t border-slate-100">{headers.map(h=><td key={h} className="px-3 py-1.5 text-slate-600 whitespace-nowrap">{String(row[h]??"")}</td>)}</tr>)}</tbody></table></div>
      <button onClick={doImport} className="w-full py-2.5 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold rounded-xl shadow transition">{rawData.length}名インポート</button>
    </div>}
  </div>;
}

function StudentForm({onAdd,existingNames}){
  const[name,setName]=useState("");const[nf,setNf]=useState(false);const[tall,setTall]=useState(false);const[gender,setGender]=useState("");
  const submit=()=>{const t=name.trim();if(!t)return;if(existingNames.includes(t)){alert("重複");return;}onAdd({id:`s_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,name:t,needsFront:nf,tall,gender});setName("");setNf(false);setTall(false);setGender("");};
  return <div className="flex flex-wrap items-end gap-3">
    <div className="flex-1 min-w-[120px]"><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">生徒名</label><input type="text" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="山田太郎" className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"/></div>
    <div className="min-w-[80px]"><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">性別</label><select value={gender} onChange={e=>setGender(e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"><option value="">-</option><option value="M">男</option><option value="F">女</option></select></div>
    <label className="flex items-center gap-2 cursor-pointer pb-2"><input type="checkbox" checked={nf} onChange={e=>setNf(e.target.checked)} className="w-4 h-4 rounded"/><span className="text-sm text-slate-600">前方</span></label>
    <label className="flex items-center gap-2 cursor-pointer pb-2"><input type="checkbox" checked={tall} onChange={e=>setTall(e.target.checked)} className="w-4 h-4 rounded"/><span className="text-sm text-slate-600">高身長</span></label>
    <button onClick={submit} className="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-semibold rounded-lg shadow-sm transition active:scale-95">追加</button>
  </div>;
}

function ConstraintForm({students,onAdd}){
  const[type,setType]=useState("separate");const[a,setA]=useState("");const[b,setB]=useState("");
  return <div className="flex flex-wrap items-end gap-3">
    <div><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">種類</label><select value={type} onChange={e=>setType(e.target.value)} className="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"><option value="separate">離す</option><option value="pair">近づける</option></select></div>
    <div className="min-w-[110px]"><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">生徒A</label><select value={a} onChange={e=>setA(e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"><option value="">選択</option>{students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
    <div className="min-w-[110px]"><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">生徒B</label><select value={b} onChange={e=>setB(e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"><option value="">選択</option>{students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
    <button onClick={()=>{if(!a||!b||a===b)return;onAdd({type,studentA:a,studentB:b});setA("");setB("");}} className="px-4 py-2 bg-violet-500 hover:bg-violet-600 text-white text-sm font-semibold rounded-lg shadow-sm transition active:scale-95">追加</button>
  </div>;
}

// Seat Grid — supports groupMap paint, pin, swap
function SeatGrid({assignment,students,rows,cols,constraints,pinned,onPinMode,pinMode,selectedStudent,groupMap,paintMode,paintGroup,onPaint,swapMode,swapFirst,onSeatClick}){
  const sm=useMemo(()=>{const m={};students.forEach(s=>(m[s.id]=s));return m;},[students]);
  const pS=useMemo(()=>{const s=new Set();Object.entries(pinned).forEach(([sid,seat])=>{if(seat!=null)s.add(sid);});return s;},[pinned]);
  const sepI=useMemo(()=>{const s=new Set();(constraints||[]).filter(c=>c.type==="separate").forEach(({studentA:a,studentB:b})=>{s.add(a);s.add(b);});return s;},[constraints]);
  const pairI=useMemo(()=>{const s=new Set();(constraints||[]).filter(c=>c.type==="pair").forEach(({studentA:a,studentB:b})=>{s.add(a);s.add(b);});return s;},[constraints]);
  const isDragging=useRef(false);

  const handlePointerDown=(idx)=>{isDragging.current=true;handleClick(idx);};
  const handlePointerEnter=(idx)=>{if(isDragging.current&&paintMode)onPaint&&onPaint(idx);};
  useEffect(()=>{const up=()=>{isDragging.current=false;};window.addEventListener("pointerup",up);return()=>window.removeEventListener("pointerup",up);},[]);

  const handleClick=(idx)=>{
    if(paintMode&&onPaint){onPaint(idx);return;}
    if(pinMode&&selectedStudent&&onPinMode){onPinMode(selectedStudent,idx);return;}
    if(swapMode&&onSeatClick){onSeatClick(idx);return;}
  };

  return <div className="relative pl-7 select-none">
    <div className="mx-auto mb-3 rounded-xl bg-gradient-to-b from-emerald-700 to-emerald-800 text-white text-center py-2 font-bold tracking-widest shadow-inner text-sm" style={{width:`${Math.min(cols*72,520)}px`}}>黒 板</div>
    <div className="mx-auto mb-5 w-16 h-5 bg-amber-600 rounded-sm shadow flex items-center justify-center"><span className="text-white text-xs font-bold">教壇</span></div>
    <div className="grid mx-auto" style={{gridTemplateColumns:`repeat(${cols},minmax(52px,1fr))`,maxWidth:`${cols*72}px`,gap:"3px"}}>
      {Array.from({length:rows*cols},(_,idx)=>{
        const sid=assignment?assignment[idx]:null;const st=sid?sm[sid]:null;const isPin=st&&pS.has(st.id);
        const row=Math.floor(idx/cols),col=idx%cols;const isSS=swapMode&&swapFirst===idx;
        const gNum=groupMap?.[idx]||0;
        const gc=gNum>0?GC[(gNum-1)%GC.length]:null;
        const borders=groupMap?getBorders(idx,cols,groupMap):{};

        let bg=gc?gc.bg:"bg-white";
        let borderColor=gc?gc.border:"border-slate-200";
        let extraStyle={minHeight:"50px"};

        // Thick borders between groups
        if(borders.right)extraStyle.borderRightWidth="4px";
        if(borders.bottom)extraStyle.borderBottomWidth="4px";
        if(borders.left)extraStyle.borderLeftWidth="4px";
        if(borders.top)extraStyle.borderTopWidth="4px";

        if(paintMode){bg=gNum>0?gc.bg:"bg-white";borderColor="border-slate-300 cursor-pointer hover:opacity-80";}
        if(swapMode){bg="bg-orange-50 hover:bg-orange-100 cursor-pointer";borderColor="border-orange-200";}
        if(isSS){borderColor="border-orange-500 ring-2 ring-orange-300";bg="bg-orange-100";}
        if(pinMode&&selectedStudent){bg="bg-indigo-50 hover:bg-indigo-100 cursor-pointer";borderColor="border-indigo-200 border-dashed";}
        if(st&&!swapMode&&!pinMode&&!paintMode){
          if(isPin){borderColor="border-indigo-400 ring-2 ring-indigo-200";bg="bg-indigo-50";}
          else if(sepI.has(st.id)){borderColor="border-rose-300";bg="bg-rose-50";}
          else if(pairI.has(st.id)){borderColor="border-emerald-300";bg="bg-emerald-50";}
          else if(st.needsFront){borderColor="border-sky-300";bg="bg-sky-50";}
          else if(st.tall){borderColor="border-amber-300";bg="bg-amber-50";}
        }

        return <div key={idx}
          onPointerDown={()=>handlePointerDown(idx)}
          onPointerEnter={()=>handlePointerEnter(idx)}
          className={`relative rounded border-2 ${borderColor} ${bg} ${!st&&!swapMode&&!pinMode&&!paintMode?"opacity-50":""} flex flex-col items-center justify-center transition-all duration-150`}
          style={extraStyle}>
          {gNum>0&&!st&&!paintMode&&<span className="absolute top-0.5 right-1 text-xs font-bold opacity-30">{gNum}</span>}
          {st?<><span className="text-xs font-bold text-slate-700 leading-tight text-center px-0.5">{st.name}</span><div className="flex gap-0.5 mt-0.5">{isPin&&<span className="text-xs">📌</span>}{st.gender==="M"&&<span className="text-xs text-blue-400">♂</span>}{st.gender==="F"&&<span className="text-xs text-pink-400">♀</span>}{st.needsFront&&<span className="w-2 h-2 rounded-full bg-sky-400"/>}{st.tall&&<span className="w-2 h-2 rounded-full bg-amber-400"/>}</div></>:paintMode?<span className="text-lg font-bold opacity-40">{gNum>0?gNum:""}</span>:<span className="text-slate-300 text-xs">{(pinMode||swapMode)?"○":"空席"}</span>}
          {col===0&&<span className="absolute -left-6 top-1/2 -translate-y-1/2 text-xs text-slate-400 font-mono">{row+1}</span>}
        </div>;
      })}
    </div>
    <div className="grid mx-auto mt-1" style={{gridTemplateColumns:`repeat(${cols},minmax(52px,1fr))`,maxWidth:`${cols*72}px`,gap:"3px"}}>
      {Array.from({length:cols},(_,c)=><div key={c} className="text-center text-xs text-slate-400 font-mono">{c+1}列</div>)}
    </div>
  </div>;
}

function App(){
  const[tab,setTab]=useState("students");
  const[students,setStudents]=useState([]);const[constraints,setConstraints]=useState([]);
  const[rows,setRows]=useState(6);const[cols,setCols]=useState(5);
  const[assignment,setAssignment]=useState(null);const[history,setHistory]=useState([]);
  const[generating,setGenerating]=useState(false);const[score,setScore]=useState(null);
  const[pinned,setPinned]=useState({});const[pinMode,setPinMode]=useState(false);const[pinStudent,setPinStudent]=useState("");
  const[showImport,setShowImport]=useState(false);const[importMsg,setImportMsg]=useState("");
  const[genderMix,setGenderMix]=useState(false);
  // groupMap: {seatIdx: groupNumber(1-8), ...} — 0 or missing = no group
  const[groupMap,setGroupMap]=useState({});
  const[paintMode,setPaintMode]=useState(false);
  const[paintGroup,setPaintGroup]=useState(1);
  const[swapMode,setSwapMode]=useState(false);const[swapFirst,setSwapFirst]=useState(null);

  useEffect(()=>{const d=ld();if(d){d.students&&setStudents(d.students);d.constraints&&setConstraints(d.constraints);d.rows&&setRows(d.rows);d.cols&&setCols(d.cols);d.history&&setHistory(d.history);d.pinned&&setPinned(d.pinned);d.genderMix!=null&&setGenderMix(d.genderMix);d.groupMap&&setGroupMap(d.groupMap);}},[]);

  const sv=useCallback((s,c,r,cl,h,p,gm,gMap)=>{svLS({students:s,constraints:c,rows:r,cols:cl,history:h,pinned:p,genderMix:gm,groupMap:gMap});},[]);

  const addStudent=useCallback(st=>{const n=[...students,st];setStudents(n);sv(n,constraints,rows,cols,history,pinned,genderMix,groupMap);},[students,constraints,rows,cols,history,pinned,genderMix,groupMap,sv]);
  const removeStudent=useCallback(id=>{const n=students.filter(s=>s.id!==id);const nc=constraints.filter(c=>c.studentA!==id&&c.studentB!==id);const np={...pinned};delete np[id];setStudents(n);setConstraints(nc);setPinned(np);setAssignment(null);sv(n,nc,rows,cols,history,np,genderMix,groupMap);},[students,constraints,rows,cols,history,pinned,genderMix,groupMap,sv]);
  const addConstraint=useCallback(con=>{const dup=constraints.find(c=>c.type===con.type&&((c.studentA===con.studentA&&c.studentB===con.studentB)||(c.studentA===con.studentB&&c.studentB===con.studentA)));if(dup){alert("重複");return;}const n=[...constraints,con];setConstraints(n);sv(students,n,rows,cols,history,pinned,genderMix,groupMap);},[constraints,students,rows,cols,history,pinned,genderMix,groupMap,sv]);
  const removeConstraint=useCallback(idx=>{const n=constraints.filter((_,i)=>i!==idx);setConstraints(n);sv(students,n,rows,cols,history,pinned,genderMix,groupMap);},[constraints,students,rows,cols,history,pinned,genderMix,groupMap,sv]);
  const handleImport=useCallback((news,skip)=>{const n=[...students,...news];setStudents(n);sv(n,constraints,rows,cols,history,pinned,genderMix,groupMap);setImportMsg(`${news.length}名取込${skip>0?`（重複${skip}名スキップ）`:""}`);setShowImport(false);setTimeout(()=>setImportMsg(""),4000);},[students,constraints,rows,cols,history,pinned,genderMix,groupMap,sv]);
  const handlePinSeat=useCallback((sid,seat)=>{const ex=Object.entries(pinned).find(([s,st])=>st===seat&&s!==sid);if(ex){alert("既に別の生徒が固定");return;}const np={...pinned,[sid]:seat};setPinned(np);setPinMode(false);setPinStudent("");if(assignment){const n=[...assignment];const old=n.indexOf(sid);if(old!==-1)n[old]=null;const disp=n[seat];n[seat]=sid;if(disp&&old!==-1)n[old]=disp;setAssignment(n);}sv(students,constraints,rows,cols,history,np,genderMix,groupMap);},[pinned,assignment,students,constraints,rows,cols,history,genderMix,groupMap,sv]);
  const unpinStudent=useCallback(sid=>{const np={...pinned};delete np[sid];setPinned(np);sv(students,constraints,rows,cols,history,np,genderMix,groupMap);},[pinned,students,constraints,rows,cols,history,genderMix,groupMap,sv]);
  const handleUpdateGrid=useCallback((nr,nc)=>{setRows(nr);setCols(nc);setAssignment(null);const t=nr*nc;const np={};Object.entries(pinned).forEach(([s,seat])=>{if(seat<t)np[s]=seat;});setPinned(np);const ng={};Object.entries(groupMap).forEach(([k,v])=>{if(parseInt(k)<t)ng[k]=v;});setGroupMap(ng);sv(students,constraints,nr,nc,history,np,genderMix,ng);},[students,constraints,history,pinned,genderMix,groupMap,sv]);

  const handlePaint=useCallback(idx=>{const ng={...groupMap};if(ng[idx]===paintGroup){delete ng[idx];}else{ng[idx]=paintGroup;}setGroupMap(ng);sv(students,constraints,rows,cols,history,pinned,genderMix,ng);},[groupMap,paintGroup,students,constraints,rows,cols,history,pinned,genderMix,sv]);
  const clearGroups=useCallback(()=>{setGroupMap({});sv(students,constraints,rows,cols,history,pinned,genderMix,{});},[students,constraints,rows,cols,history,pinned,genderMix,sv]);

  const handleSwapClick=useCallback(si=>{if(swapFirst===null){setSwapFirst(si);return;}if(swapFirst===si){setSwapFirst(null);return;}const n=[...assignment];const tmp=n[swapFirst];n[swapFirst]=n[si];n[si]=tmp;setAssignment(n);setSwapFirst(null);},[swapFirst,assignment]);

  const handleGenerate=useCallback(()=>{
    if(!students.length){alert("生徒を登録");return;}if(students.length>rows*cols){alert("座席不足");return;}
    setGenerating(true);setSwapMode(false);setSwapFirst(null);
    setTimeout(()=>{const res=genSeat(students,rows,cols,constraints,history,pinned,genderMix);setAssignment(res);
      if(res){const entry=res.map((sid,i)=>sid?{studentId:sid,seat:i,neighbors:gN(i,cols).map(n=>res[n]).filter(Boolean)}:null).filter(Boolean);const nh=[...history,entry].slice(-5);setHistory(nh);sv(students,constraints,rows,cols,nh,pinned,genderMix,groupMap);
        let sc=0,mx=0;students.filter(s=>s.needsFront).forEach(s=>{const p=res.indexOf(s.id);mx++;if(p!==-1&&Math.floor(p/cols)<=1)sc++;});
        constraints.filter(c=>c.type==="separate").forEach(({studentA:sA,studentB:sB})=>{const pA=res.indexOf(sA),pB=res.indexOf(sB);mx++;if(pA!==-1&&pB!==-1&&!gN(pA,cols).includes(pB))sc++;});
        constraints.filter(c=>c.type==="pair").forEach(({studentA:sA,studentB:sB})=>{const pA=res.indexOf(sA),pB=res.indexOf(sB);mx++;if(pA!==-1&&pB!==-1&&gN(pA,cols).includes(pB))sc++;});
        setScore(mx>0?{met:sc,total:mx}:null);}setGenerating(false);},400);
  },[students,rows,cols,constraints,history,pinned,genderMix,groupMap,sv]);

  const handleReset=useCallback(()=>{if(!confirm("全データをリセット？"))return;setStudents([]);setConstraints([]);setAssignment(null);setHistory([]);setScore(null);setPinned({});setGenderMix(false);setGroupMap({});setSwapMode(false);setSwapFirst(null);setPaintMode(false);clr();},[]);

  const sMap=useMemo(()=>{const m={};students.forEach(s=>(m[s.id]=s));return m;},[students]);
  const pinCnt=Object.values(pinned).filter(v=>v!=null).length;
  const usedGroups=useMemo(()=>{const s=new Set(Object.values(groupMap));s.delete(0);return[...s].sort((a,b)=>a-b);},[groupMap]);
  const groupCounts=useMemo(()=>{const c={};Object.values(groupMap).forEach(g=>{if(g>0)c[g]=(c[g]||0)+1;});return c;},[groupMap]);

  const tabs=[{id:"students",label:"生徒管理",icon:"👤"},{id:"constraints",label:"制約設定",icon:"🔗"},{id:"layout",label:"配置・班",icon:"🏫"},{id:"generate",label:"席替え実行",icon:"✨"}];

  return <div className="min-h-screen bg-gradient-to-br from-slate-50 via-sky-50 to-indigo-50">
    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50"><div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between"><div className="flex items-center gap-3"><div className="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center shadow-md"><span className="text-white text-lg">席</span></div><div><h1 className="text-lg font-extrabold tracking-tight text-slate-800">席替えマスター</h1><p className="text-xs text-slate-400 -mt-0.5">公平で配慮のある席替えを</p></div></div><div className="flex items-center gap-3"><span className="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded-full">{students.length}名</span>{pinCnt>0&&<span className="text-xs text-indigo-500 bg-indigo-50 px-2 py-1 rounded-full">📌{pinCnt}</span>}<button onClick={handleReset} className="text-xs text-rose-400 hover:text-rose-600 transition">リセット</button></div></div></header>

    <div className="max-w-5xl mx-auto px-4 mt-4"><nav className="flex gap-1 bg-white/60 backdrop-blur rounded-xl p-1 shadow-sm border border-slate-100">{tabs.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setPaintMode(false);}} className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all ${tab===t.id?"bg-white text-sky-600 shadow-sm":"text-slate-500 hover:text-slate-700 hover:bg-white/50"}`}><span>{t.icon}</span><span className="hidden sm:inline">{t.label}</span></button>)}</nav></div>
    {importMsg&&<div className="max-w-5xl mx-auto px-4 mt-3"><div className="bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-2.5 rounded-xl font-medium">✅ {importMsg}</div></div>}

    <main className="max-w-5xl mx-auto px-4 py-6">
      {tab==="students"&&<div className="space-y-5">
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <div className="flex items-center justify-between mb-3"><h2 className="text-sm font-bold text-slate-700">生徒を追加</h2><button onClick={()=>setShowImport(!showImport)} className={`text-xs font-semibold px-3 py-1.5 rounded-lg transition ${showImport?"bg-sky-100 text-sky-600":"bg-slate-100 text-slate-500 hover:bg-slate-200"}`}>{showImport?"✕":"📄 Excel一括"}</button></div>
          {showImport?<ExcelImport onImport={handleImport} existingNames={students.map(s=>s.name)}/>:<StudentForm onAdd={addStudent} existingNames={students.map(s=>s.name)}/>}
        </div>
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <h2 className="text-sm font-bold text-slate-700 mb-3">登録済み（{students.length}名）</h2>
          {!students.length?<p className="text-sm text-slate-400 text-center py-8">未登録</p>:<div className="flex flex-wrap gap-2">{students.map(s=><div key={s.id} className="flex items-center gap-1.5 bg-slate-50 rounded-lg px-3 py-2 border border-slate-100"><span className="text-sm font-medium text-slate-700">{s.name}</span>{s.gender==="M"&&<span className="text-xs text-blue-400">♂</span>}{s.gender==="F"&&<span className="text-xs text-pink-400">♀</span>}{s.needsFront&&<Badge color="blue">前方</Badge>}{s.tall&&<Badge color="amber">高身長</Badge>}{pinned[s.id]!=null&&<Badge color="pin" onRemove={()=>unpinStudent(s.id)}>📌</Badge>}<button onClick={()=>removeStudent(s.id)} className="text-slate-300 hover:text-rose-500 ml-0.5">×</button></div>)}</div>}
        </div>
      </div>}

      {tab==="constraints"&&<div className="space-y-5">
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5"><h2 className="text-sm font-bold text-slate-700 mb-3">制約を追加</h2>{students.length<2?<p className="text-sm text-slate-400 text-center py-4">2名以上登録</p>:<ConstraintForm students={students} onAdd={addConstraint}/>}</div>
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <div className="flex items-center justify-between"><div><h2 className="text-sm font-bold text-slate-700">男女隣り合わせ</h2><p className="text-xs text-slate-400 mt-0.5">左右が男女になるよう優先</p></div>
          <button onClick={()=>{const n=!genderMix;setGenderMix(n);sv(students,constraints,rows,cols,history,pinned,n,groupMap);}} className={`relative w-12 h-7 rounded-full transition-colors ${genderMix?"bg-pink-400":"bg-slate-200"}`}><span className={`absolute top-0.5 left-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform ${genderMix?"translate-x-5":""}`}/></button></div>
          {genderMix&&students.filter(s=>!s.gender).length>0&&<p className="mt-3 text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2">⚠ 性別未設定: {students.filter(s=>!s.gender).length}名</p>}
        </div>
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <h2 className="text-sm font-bold text-slate-700 mb-3">設定済み（{constraints.length}件）</h2>
          {!constraints.length?<p className="text-sm text-slate-400 text-center py-8">なし</p>:<div className="space-y-2">{constraints.map((c,idx)=><div key={idx} className="flex items-center justify-between bg-slate-50 rounded-lg px-4 py-2.5 border border-slate-100"><div className="flex items-center gap-2"><Badge color={c.type==="separate"?"rose":"emerald"}>{c.type==="separate"?"離す":"近づける"}</Badge><span className="text-sm font-medium">{sMap[c.studentA]?.name||"?"}</span><span className="text-slate-400">↔</span><span className="text-sm font-medium">{sMap[c.studentB]?.name||"?"}</span></div><button onClick={()=>removeConstraint(idx)} className="text-slate-300 hover:text-rose-500">×</button></div>)}</div>}
        </div>
      </div>}

      {tab==="layout"&&<div className="space-y-5">
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <h2 className="text-sm font-bold text-slate-700 mb-4">教室レイアウト</h2>
          <div className="flex flex-wrap gap-6">
            <div><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">行数</label><div className="flex items-center gap-2"><button onClick={()=>rows>3&&handleUpdateGrid(rows-1,cols)} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold">−</button><span className="w-10 text-center text-lg font-bold text-slate-700">{rows}</span><button onClick={()=>rows<8&&handleUpdateGrid(rows+1,cols)} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold">+</button></div></div>
            <div><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">列数</label><div className="flex items-center gap-2"><button onClick={()=>cols>3&&handleUpdateGrid(rows,cols-1)} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold">−</button><span className="w-10 text-center text-lg font-bold text-slate-700">{cols}</span><button onClick={()=>cols<8&&handleUpdateGrid(rows,cols+1)} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold">+</button></div></div>
            <div className="flex items-end pb-1"><span className="text-sm text-slate-500">合計 <strong>{rows*cols}席</strong>（{students.length}名）</span></div>
          </div>
        </div>

        {/* Group paint */}
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <div className="flex items-center justify-between mb-2">
            <div><h2 className="text-sm font-bold text-slate-700">班分け設定 🎨</h2><p className="text-xs text-slate-400 mt-0.5">班番号を選んで座席をクリック／ドラッグで塗り分け</p></div>
            <div className="flex gap-2">
              <button onClick={()=>setPaintMode(!paintMode)} className={`px-4 py-2 text-xs font-bold rounded-xl transition active:scale-95 ${paintMode?"bg-violet-600 text-white shadow-md":"bg-violet-100 text-violet-600 hover:bg-violet-200"}`}>{paintMode?"🎨 編集中":"🎨 班を編集"}</button>
              {Object.keys(groupMap).length>0&&<button onClick={clearGroups} className="px-3 py-2 text-xs font-semibold rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 transition">クリア</button>}
            </div>
          </div>

          {paintMode&&<div className="mb-4 bg-violet-50 border border-violet-200 rounded-xl p-4">
            <p className="text-xs font-semibold text-violet-700 mb-3">塗る班番号を選択してからグリッドをクリック（同じ班をもう一度クリックで解除）</p>
            <div className="flex flex-wrap gap-2">
              {[1,2,3,4,5,6,7,8].map(g=><button key={g} onClick={()=>setPaintGroup(g)} className={`w-10 h-10 rounded-xl text-sm font-bold transition border-2 ${paintGroup===g?"ring-2 ring-offset-1 ring-violet-400 scale-110":""} ${GC[(g-1)%GC.length].bg} ${GC[(g-1)%GC.length].border}`}>{g}班</button>)}
              <button onClick={()=>setPaintGroup(0)} className={`px-3 h-10 rounded-xl text-sm font-bold transition border-2 border-slate-300 bg-white text-slate-500 ${paintGroup===0?"ring-2 ring-offset-1 ring-slate-400 scale-110":""}`}>消しゴム</button>
            </div>
          </div>}

          <SeatGrid assignment={null} students={students} rows={rows} cols={cols} constraints={[]} pinned={{}} groupMap={groupMap} paintMode={paintMode} paintGroup={paintGroup} onPaint={idx=>{const ng={...groupMap};if(paintGroup===0){delete ng[idx];}else if(ng[idx]===paintGroup){delete ng[idx];}else{ng[idx]=paintGroup;}setGroupMap(ng);sv(students,constraints,rows,cols,history,pinned,genderMix,ng);}}/>

          {usedGroups.length>0&&<div className="mt-4 flex flex-wrap gap-2">{usedGroups.map(g=><span key={g} className={`px-3 py-1 rounded-full text-xs font-bold ${GC[(g-1)%GC.length].label}`}>{g}班: {groupCounts[g]||0}席</span>)}</div>}
        </div>

        {/* Pin */}
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <h2 className="text-sm font-bold text-slate-700 mb-1">座席固定 📌</h2>
          <p className="text-xs text-slate-400 mb-4">特定の生徒を決まった席に固定</p>
          {!students.length?<p className="text-sm text-slate-400 text-center py-4">先に生徒を登録</p>:<div className="space-y-4">
            <div className="flex flex-wrap items-end gap-3">
              <div className="min-w-[160px]"><label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">生徒</label><select value={pinStudent} onChange={e=>{setPinStudent(e.target.value);setPinMode(false);}} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"><option value="">選択</option>{students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
              {pinStudent&&<button onClick={()=>{setPinMode(!pinMode);setPaintMode(false);}} className={`px-4 py-2 text-sm font-semibold rounded-lg shadow-sm transition active:scale-95 ${pinMode?"bg-indigo-600 text-white":"bg-indigo-100 text-indigo-600 hover:bg-indigo-200"}`}>{pinMode?"🔍 クリック":"📌 選ぶ"}</button>}
              {pinStudent&&pinned[pinStudent]!=null&&<button onClick={()=>unpinStudent(pinStudent)} className="px-4 py-2 text-sm font-semibold rounded-lg bg-rose-50 text-rose-500 hover:bg-rose-100 transition">解除</button>}
            </div>
            {pinMode&&pinStudent&&<div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4"><p className="text-sm text-indigo-700 font-medium mb-3">📌 <strong>{sMap[pinStudent]?.name}</strong> →座席クリック</p><SeatGrid assignment={assignment} students={students} rows={rows} cols={cols} constraints={[]} pinned={pinned} pinMode={true} selectedStudent={pinStudent} onPinMode={handlePinSeat} groupMap={groupMap}/></div>}
            {pinCnt>0&&<div><p className="text-xs font-semibold text-slate-500 mb-2">固定済み</p><div className="flex flex-wrap gap-2">{Object.entries(pinned).filter(([_,s])=>s!=null).map(([sid,seat])=><Badge key={sid} color="pin" onRemove={()=>unpinStudent(sid)}>📌 {sMap[sid]?.name}→{Math.floor(seat/cols)+1}行{seat%cols+1}列</Badge>)}</div></div>}
          </div>}
        </div>
      </div>}

      {tab==="generate"&&<div className="space-y-5">
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div><h2 className="text-sm font-bold text-slate-700">席替え実行</h2><p className="text-xs text-slate-400 mt-0.5">制約・固定席を考慮して最適配置</p></div>
            <div className="flex items-center gap-2 flex-wrap">
              {score&&<span className={`text-xs font-semibold px-3 py-1 rounded-full ${score.met===score.total?"bg-emerald-100 text-emerald-700":score.met/score.total>=0.7?"bg-amber-100 text-amber-700":"bg-rose-100 text-rose-700"}`}>充足{score.met}/{score.total}</span>}
              {assignment&&<button onClick={()=>{setSwapMode(!swapMode);setSwapFirst(null);}} className={`px-4 py-2 rounded-xl text-xs font-bold transition active:scale-95 ${swapMode?"bg-orange-500 text-white shadow-md":"bg-orange-100 text-orange-600 hover:bg-orange-200"}`}>{swapMode?"🔄 入替ON":"🔄 入替"}</button>}
              <button onClick={handleGenerate} disabled={generating||!students.length} className={`px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition active:scale-95 ${generating||!students.length?"bg-slate-200 text-slate-400 cursor-not-allowed":"bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-600 hover:to-indigo-600 text-white"}`}>{generating?<span className="flex items-center gap-2"><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/>計算中</span>:assignment?"再生成":"席替え実行"}</button>
            </div>
          </div>
          {swapMode&&<div className="mb-4 bg-orange-50 border border-orange-200 rounded-xl px-4 py-3 text-sm text-orange-700">🔄 {swapFirst!=null?`1席目選択済（${Math.floor(swapFirst/cols)+1}行${swapFirst%cols+1}列）→入替先クリック`:"入替えたい席を2つクリック"}</div>}
          <div className="flex flex-wrap gap-2 mb-4 text-xs">
            <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded-full">{rows}×{cols}={rows*cols}席</span>
            <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded-full">{students.length}名</span>
            {constraints.length>0&&<span className="bg-slate-100 text-slate-600 px-2 py-1 rounded-full">制約{constraints.length}</span>}
            {genderMix&&<span className="bg-pink-50 text-pink-600 px-2 py-1 rounded-full">♂♀</span>}
            {pinCnt>0&&<span className="bg-indigo-50 text-indigo-600 px-2 py-1 rounded-full">📌{pinCnt}</span>}
            {usedGroups.length>0&&<span className="bg-violet-50 text-violet-600 px-2 py-1 rounded-full">{usedGroups.length}班</span>}
          </div>
          {assignment?<SeatGrid assignment={assignment} students={students} rows={rows} cols={cols} constraints={constraints} pinned={pinned} groupMap={groupMap} swapMode={swapMode} swapFirst={swapFirst} onSeatClick={handleSwapClick}/>:<div className="text-center py-16 text-slate-300"><div className="text-5xl mb-3">🪑</div><p className="text-sm">「席替え実行」を押してください</p></div>}
        </div>
        {assignment&&<div className="bg-white/70 rounded-xl border border-slate-100 p-4"><p className="text-xs font-semibold text-slate-500 mb-2">凡例</p><div className="flex flex-wrap gap-3 text-xs text-slate-600"><span className="flex items-center gap-1"><span className="w-4 h-3 rounded border-2 border-indigo-400 bg-indigo-50 ring-2 ring-indigo-200"/>固定</span><span className="flex items-center gap-1"><span className="w-4 h-3 rounded border-2 border-sky-300 bg-sky-50"/>前方</span><span className="flex items-center gap-1"><span className="w-4 h-3 rounded border-2 border-amber-300 bg-amber-50"/>高身長</span><span className="flex items-center gap-1"><span className="w-4 h-3 rounded border-2 border-rose-300 bg-rose-50"/>離す</span><span className="flex items-center gap-1"><span className="w-4 h-3 rounded border-2 border-emerald-300 bg-emerald-50"/>近づける</span><span className="flex items-center gap-1"><span className="text-blue-400">♂</span>男</span><span className="flex items-center gap-1"><span className="text-pink-400">♀</span>女</span></div></div>}
      </div>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
